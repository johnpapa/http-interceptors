name: ✨ Feature Request
description: Suggest a new interceptor, feature, or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: app
    attributes:
      label: Which app does this apply to?
      options:
        - angular-app
        - angular-http-hard-way
        - svelte-app
        - All apps
        - New framework implementation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      placeholder: What problem does this solve? How does it help demonstrate interceptors?
